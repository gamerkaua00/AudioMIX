name: Gerar APK e Release Android

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Configurar Java (Necessário para Android)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Dependências (NPM)
      run: npm install

    - name: Compilar Código React
      run: npm run build

    - name: Montar Projeto Android (Capacitor)
      run: npx cap add android

    - name: Instalar Ferramenta de Ícones
      run: npm install @capacitor/assets -D

    - name: Gerar Ícones e Splash Screens Oficiais
      run: npx capacitor-assets generate --android

    - name: Sincronizar Código e Ícones com o Android
      run: npx cap sync android

    - name: Compilar o APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Publicar APK na aba Releases
      uses: ncipollo/release-action@v1
      with:
        artifacts: "android/app/build/outputs/apk/debug/app-debug.apk"
        tag: "latest"
        name: "AudioMIX - Nova Versão (Com Capa)"
        body: "Baixe o ficheiro `app-debug.apk` abaixo e instale. O nome da app foi atualizado para AudioMIX e o ícone oficial foi aplicado!"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}